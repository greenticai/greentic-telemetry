name: Codex Semver Fix
# Re-enabled on a nightly schedule alongside nightly-semver.yml. Was previously
# disabled (pull_request trigger commented out) with a "re-enable once API
# surface stabilizes" TODO — the API has stabilized and cargo-semver-checks
# now runs in advisory mode, so the Codex remediation path is safe to attach
# on a schedule. See plans/binary-bifurcation.md Phase A.4 (Wave 2).

on:
  schedule:
    # 04:53 UTC — staggered against Wave 1 codex-semver-fix callers:
    # greentic-types 04:11, greentic-component 04:17, greentic-oauth 04:23,
    # serde-yaml-gtc 04:29, greentic-secrets 04:37.
    - cron: "21 3 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to scan and patch (only for manual run)"
        required: false
        default: ""
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semver-fix:
    uses: greenticai/.github/.github/workflows/codex-semver-fix.yml@main
    with:
      branch: ${{ github.event.inputs.branch || '' }}
    secrets: inherit
