name: Codex Security Fix
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A.4 (Wave 2). Manual runs remain available via workflow_dispatch.

on:
  schedule:
    # 04:49 UTC — staggered against Wave 1 sibling Codex callers:
    #   codex-security-fix: greentic-types 04:07, greentic-component 04:13,
    #                       greentic-oauth 04:19, greentic-secrets 04:31
    #   codex-semver-fix:   greentic-types 04:11, greentic-component 04:17,
    #                       greentic-oauth 04:23, serde-yaml-gtc 04:29,
    #                       greentic-secrets 04:37
    #   perf (moved off PR): greentic-component 04:43, greentic-secrets 04:47
    - cron: "49 4 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to scan and patch (only for manual run)"
        required: false
        default: ""
      max_alerts:
        description: "Maximum open alerts per source to include"
        required: true
        default: "20"
permissions:
  contents: write
  pull-requests: write
  security-events: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-fix:
    # Do not run on fork PRs to avoid passing untrusted refs into privileged remediation workflows.
    # With pull_request trigger removed, this guard is a no-op; kept for defense-in-depth
    # if pull_request is ever re-added.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: greenticai/.github/.github/workflows/codex-security-fix.yml@main
    with:
      branch: ${{ github.event.inputs.branch || '' }}
      max_alerts: ${{ github.event.inputs.max_alerts || '20' }}
    secrets: inherit
